name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers
        run: |
          npx prism mock contracts/iot-ingestion.openapi.yaml --port 4010 > prism-iot.log 2>&1 &
          npx prism mock contracts/ai-vision.openapi.yaml --port 4011 > prism-vision.log 2>&1 &

      - name: Wait for mock servers
        run: 
          sleep 10
          npx wait-on http://127.0.0.1:4010/health http://127.0.0.1:4011/health --timeout 60000

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
