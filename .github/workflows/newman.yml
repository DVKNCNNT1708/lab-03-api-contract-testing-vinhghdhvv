name: Newman Contract Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers
        run: |
          nohup npx prism mock contracts/iot-ingestion.openapi.yaml --host 0.0.0.0 -p 4010 > prism-iot.log 2>&1 &
          nohup npx prism mock contracts/ai-vision.openapi.yaml --host 0.0.0.0 -p 4011 > prism-vision.log 2>&1 &
          sleep 15

      - name: Check mock health
        run: |
          curl http://127.0.0.1:4010/health
          curl http://127.0.0.1:4011/health

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          echo "===== IOT LOG ====="
          cat prism-iot.log || true
          echo "===== VISION LOG ====="
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/